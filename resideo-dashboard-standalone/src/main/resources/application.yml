server:
  port: ${PORT:8080}

spring:
  application:
    name: openqa-dashboard

  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:h2:file:./data/openqa-dashboard;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
    driver-class-name: ${JDBC_DRIVER:org.h2.Driver}
    username: ${JDBC_DATABASE_USERNAME:sa}
    password: ${JDBC_DATABASE_PASSWORD:}

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

resideo:
  enabled: true
  auth-enabled: ${AUTH_ENABLED:true}
  workspace: ${WORKSPACE:.}
  db-mode: ${DB_MODE:FILE}
  poll-interval-ms: 5000
  cucumber-json-path: ${CUCUMBER_JSON_PATH:target/cucumber.json}
  report-path: ${REPORT_PATH:target/open-reporter/report.html}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  seed-sample-data: ${SEED_SAMPLE_DATA:false}
  storage:
    type: ${STORAGE_TYPE:local}
    supabase-url: ${SUPABASE_URL:}
    supabase-key: ${SUPABASE_SERVICE_KEY:}
    supabase-bucket: ${SUPABASE_BUCKET:reports}
  agent:
    enabled: ${AGENT_ENABLED:false}
    api-url: ${AGENT_API_URL:http://localhost:8080}
    api-token: ${AGENT_API_TOKEN:}
    poll-interval-ms: ${AGENT_POLL_INTERVAL:5000}
    workspace-path: ${AGENT_WORKSPACE:.}

logging:
  level:
    com.openqa: ${LOG_LEVEL:INFO}
    org.flywaydb: INFO
