server:
  port: ${PORT:8080}

spring:
  application:
    name: openqa-dashboard

  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:sqlite:./data/dashboard.db}
    driver-class-name: org.sqlite.JDBC
    username: ""
    password: ""

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

openqa:
  enabled: true
  workspace: ${WORKSPACE:.}
  poll-interval-ms: 2000
  cucumber-json-path: ${CUCUMBER_JSON_PATH:target/cucumber.json}
  report-path: ${REPORT_PATH:target/open-reporter/report.html}
  config-path: dashboard-config.json

logging:
  level:
    com.openqa: ${LOG_LEVEL:INFO}
    org.flywaydb: INFO
